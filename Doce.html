<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Extraer texto de imagen (OCR)</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    textarea {
      width: 90%;
      height: 200px;
      margin-top: 15px;
    }
    button {
      margin-top: 10px;
      padding: 10px;
      font-size: 16px;
    }
    img {
      max-width: 300px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h2>📷 Extraer texto de una imagen</h2>

  <input type="file" id="imageInput" accept="image/*">
  <br>
  <img id="preview" />

  <br>
  <button onclick="extraerTexto()">🔍 Extraer texto</button>

  <textarea id="resultado" placeholder="Aquí aparecerá el texto..."></textarea>
  <br>
  <button onclick="copiarTexto()">📋 Copiar texto</button>

  <script>
    const input = document.getElementById('imageInput');
    const preview = document.getElementById('preview');

    input.addEventListener('change', () => {
      const file = input.files[0];
      preview.src = URL.createObjectURL(file);
    });

    function extraerTexto() {
      const file = input.files[0];
      if (!file) {
        alert("Sube una imagen primero");
        return;
      }

      document.getElementById("resultado").value = "Procesando...";

      Tesseract.recognize(
        file,
        'spa', // español
        {
          logger: m => console.log(m)
        }
      ).then(({ data: { text } }) => {
        document.getElementById("resultado").value = text;
      });
    }

    function copiarTexto() {
      const texto = document.getElementById("resultado");
      texto.select();
      document.execCommand("copy");
      alert("Texto copiado ✅");
    }
  </script>

</body>
</html>
