<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>OCR desde portapapeles</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }
    textarea {
      width: 90%;
      height: 200px;
      margin-top: 10px;
    }
    img {
      max-width: 300px;
      margin-top: 10px;
    }
    .box {
      border: 2px dashed #aaa;
      padding: 20px;
      margin: 15px;
    }
  </style>
</head>
<body>

  <h2>📋 Pega una imagen (Ctrl + V)</h2>

  <div class="box">
    👉 Copia una imagen y pégala aquí
  </div>

  <img id="preview" />

  <br>
  <button onclick="extraerTexto()">🔍 Extraer texto</button>

  <textarea id="resultado" placeholder="Aquí aparecerá el texto..."></textarea>
  <br>
  <button onclick="copiarTexto()">📋 Copiar texto</button>

  <script>
    let imagenPegada = null;

    document.addEventListener('paste', (event) => {
      const items = event.clipboardData.items;

      for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf("image") !== -1) {
          const file = items[i].getAsFile();
          imagenPegada = file;

          const url = URL.createObjectURL(file);
          document.getElementById("preview").src = url;
        }
      }
    });

    function extraerTexto() {
      if (!imagenPegada) {
        alert("Pega una imagen primero (Ctrl + V)");
        return;
      }

      document.getElementById("resultado").value = "Procesando...";

      Tesseract.recognize(
        imagenPegada,
        'spa',
        {
          logger: m => console.log(m)
        }
      ).then(({ data: { text } }) => {
        document.getElementById("resultado").value = text;
      });
    }

    function copiarTexto() {
      const texto = document.getElementById("resultado");
      texto.select();
      document.execCommand("copy");
      alert("Texto copiado ✅");
    }
  </script>

</body>
</html>
