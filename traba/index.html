<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lector TTS</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2196f3">
    <link rel="icon" href="imagenes/imagen1.png" type="image/png">


<style>
*{
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    max-width:1000px;
    margin:auto;
    padding:15px;
    background:#f5f5f5;
}

h1{
    text-align:center;
}

textarea{
    width:100%;
    height:350px;
    resize:vertical;
    padding:12px;
    font-size:18px;
    border:1px solid #ccc;
    border-radius:10px;
}

.controles{
    margin-top:15px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

button{
    cursor:pointer;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

select,
input[type="range"]{
    padding:10px;
}

#instalar{
    background:#4caf50;
    color:white;
}

.info{
    margin-top:10px;
    font-size:14px;
    color:#555;
}
</style>
</head>
<body>

<h1>🔊 Lector TTS</h1>

<textarea
id="texto"
placeholder="Pega aquí tu lectura..."></textarea>

<div class="controles">

<button onclick="pegarTexto()">
📋 Pegar
</button>

<button onclick="leer()">
▶ Leer
</button>

<button onclick="speechSynthesis.pause()">
⏸ Pausar
</button>

<button onclick="speechSynthesis.resume()">
▶ Continuar
</button>

<button onclick="speechSynthesis.cancel()">
⏹ Detener
</button>

<button id="instalar" hidden>
📲 Instalar App
</button>

</div>

<br>

<label><b>Voz:</b></label>
<select id="voces"></select>

<br><br>

<label><b>Velocidad:</b></label>
<input
type="range"
id="velocidad"
min="0.5"
max="2"
step="0.1"
value="1">

<span id="valorVelocidad">1.0</span>

<div class="info">
Si tienes instalada la voz Dalia, se seleccionará automáticamente.
</div>

<script>

const vocesSelect = document.getElementById("voces");
const velocidad = document.getElementById("velocidad");
const valorVelocidad = document.getElementById("valorVelocidad");

let voces = [];

velocidad.addEventListener("input", ()=>{
    valorVelocidad.textContent = velocidad.value;
});

function cargarVoces(){

    voces = speechSynthesis.getVoices();

    vocesSelect.innerHTML = "";

    voces.forEach((voz,index)=>{

        const option = document.createElement("option");

        option.value = index;

        option.textContent =
            voz.name + " (" + voz.lang + ")";

        vocesSelect.appendChild(option);

        if(
            voz.name.toLowerCase().includes("dalia")
        ){
            vocesSelect.value = index;
        }

    });

}

speechSynthesis.onvoiceschanged = cargarVoces;

cargarVoces();

async function pegarTexto(){

    try{

        const texto =
            await navigator.clipboard.readText();

        document.getElementById("texto").value =
            texto;

    }catch(error){

        alert(
            "No se pudo acceder al portapapeles."
        );

    }

}

function leer(){

    speechSynthesis.cancel();

    const texto =
        document.getElementById("texto")
        .value
        .trim();

    if(!texto){
        alert("Pega o escribe un texto.");
        return;
    }

    const mensaje =
        new SpeechSynthesisUtterance(texto);

    mensaje.voice =
        voces[vocesSelect.value];

    mensaje.rate =
        parseFloat(velocidad.value);

    speechSynthesis.speak(mensaje);

}

let deferredPrompt;

window.addEventListener(
    'beforeinstallprompt',
    (e)=>{

        e.preventDefault();

        deferredPrompt = e;

        document
            .getElementById("instalar")
            .hidden = false;

    }
);

document
.getElementById("instalar")
.addEventListener("click",async()=>{

    if(!deferredPrompt) return;

    deferredPrompt.prompt();

    await deferredPrompt.userChoice;

    deferredPrompt = null;

});

if('serviceWorker' in navigator){

    window.addEventListener('load',()=>{

        navigator.serviceWorker
        .register('./sw.js');

    });

}

</script>

</body>
</html>
