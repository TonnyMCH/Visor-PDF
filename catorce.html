<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unir Audios</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    padding:20px;
    text-align:center;
}

.container{
    background:white;
    max-width:500px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
    margin:10px 0;
    width:100%;
}

button{
    background:#28a745;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#218838;
}

audio{
    margin-top:20px;
    width:100%;
}
</style>
</head>
<body>

<div class="container">
    <h2>Unir Audios MP3</h2>

    <p>Selecciona dos archivos de audio</p>

    <input type="file" id="audio1" accept="audio/*">
    <input type="file" id="audio2" accept="audio/*">

    <button onclick="unirAudios()">Unir Audios</button>

    <br><br>

    <a id="descargar" style="display:none;" download="audio_unido.wav">
        <button>Descargar Audio Unido</button>
    </a>

    <audio id="preview" controls style="display:none;"></audio>
</div>

<script>
async function unirAudios() {

    const file1 = document.getElementById('audio1').files[0];
    const file2 = document.getElementById('audio2').files[0];

    if(!file1 || !file2){
        alert("Selecciona los dos audios");
        return;
    }

    const audioContext = new (window.AudioContext || window.webkitAudioContext)();

    const arrayBuffer1 = await file1.arrayBuffer();
    const arrayBuffer2 = await file2.arrayBuffer();

    const audioBuffer1 = await audioContext.decodeAudioData(arrayBuffer1);
    const audioBuffer2 = await audioContext.decodeAudioData(arrayBuffer2);

    const canales = audioBuffer1.numberOfChannels;
    const tasa = audioBuffer1.sampleRate;

    const nuevoBuffer = audioContext.createBuffer(
        canales,
        audioBuffer1.length + audioBuffer2.length,
        tasa
    );

    for(let canal = 0; canal < canales; canal++){

        const datos = nuevoBuffer.getChannelData(canal);

        datos.set(audioBuffer1.getChannelData(canal), 0);

        datos.set(
            audioBuffer2.getChannelData(canal),
            audioBuffer1.length
        );
    }

    const wavBlob = bufferAWav(nuevoBuffer);

    const url = URL.createObjectURL(wavBlob);

    const preview = document.getElementById('preview');
    preview.src = url;
    preview.style.display = "block";

    const descargar = document.getElementById('descargar');
    descargar.href = url;
    descargar.style.display = "inline-block";
}

function bufferAWav(buffer){

    const numeroCanales = buffer.numberOfChannels;
    const largo = buffer.length * numeroCanales * 2 + 44;

    const bufferArray = new ArrayBuffer(largo);
    const view = new DataView(bufferArray);

    escribirTexto(view, 0, 'RIFF');
    view.setUint32(4, 36 + buffer.length * 2, true);
    escribirTexto(view, 8, 'WAVE');
    escribirTexto(view, 12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, numeroCanales, true);
    view.setUint32(24, buffer.sampleRate, true);
    view.setUint32(28, buffer.sampleRate * 2, true);
    view.setUint16(32, numeroCanales * 2, true);
    view.setUint16(34, 16, true);
    escribirTexto(view, 36, 'data');
    view.setUint32(40, buffer.length * 2, true);

    let offset = 44;

    for(let i = 0; i < buffer.length; i++){
        for(let canal = 0; canal < numeroCanales; canal++){

            let sample = buffer.getChannelData(canal)[i];

            sample = Math.max(-1, Math.min(1, sample));

            view.setInt16(
                offset,
                sample < 0 ? sample * 0x8000 : sample * 0x7FFF,
                true
            );

            offset += 2;
        }
    }

    return new Blob([view], { type: 'audio/wav' });
}

function escribirTexto(view, offset, texto){
    for(let i = 0; i < texto.length; i++){
        view.setUint8(offset + i, texto.charCodeAt(i));
    }
}
</script>

</body>
</html>
