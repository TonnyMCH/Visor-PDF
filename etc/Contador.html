<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contador de Tiempo</title>

<link rel="icon" href="imagenes/imagen1.png" type="image/png">


<style>
<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
    });
}
</script>
    body{
        font-family: Arial, sans-serif;
        background:#f2f2f2;
        margin:0;
        padding:20px;
    }

    h1{
        text-align:center;
        color:#333;
    }

    .contenedor{
        max-width:700px;
        margin:auto;
    }

    .formulario{
        background:white;
        padding:20px;
        border-radius:15px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
        margin-bottom:20px;
    }

    input, textarea, button{
        width:100%;
        margin-top:10px;
        padding:12px;
        border-radius:10px;
        border:1px solid #ccc;
        box-sizing:border-box;
        font-size:16px;
    }

    textarea{
        resize:none;
        height:80px;
    }

    button{
        background:#007bff;
        color:white;
        border:none;
        cursor:pointer;
        font-weight:bold;
    }

    button:hover{
        background:#0056b3;
    }

    .botones-grupo{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:10px;
        margin-top:20px;
    }

    .botones-grupo button{
        margin-top:0;
    }

    .btn-exportar{
        background:#28a745;
    }

    .btn-exportar:hover{
        background:#218838;
    }

    .btn-importar{
        background:#ffc107;
        color:#333;
    }

    .btn-importar:hover{
        background:#e0a800;
    }

    #archivoImport{
        display:none;
    }

    .tarjeta{
        background:white;
        padding:15px;
        border-radius:15px;
        margin-bottom:15px;
        box-shadow:0 0 8px rgba(0,0,0,0.08);
    }

    .detalle{
        font-size:18px;
        font-weight:bold;
        color:#333;
    }

    .fecha{
        color:#666;
        margin-top:5px;
    }

    .tiempo{
        margin-top:10px;
        font-size:17px;
        color:#007bff;
        font-weight:bold;
    }

    .eliminar{
        background:#dc3545;
        margin-top:15px;
    }

    .eliminar:hover{
        background:#a71d2a;
    }

    .mensaje{
        padding:10px;
        border-radius:5px;
        margin-bottom:10px;
        display:none;
    }

    .mensaje.exito{
        background:#d4edda;
        color:#155724;
        border:1px solid #c3e6cb;
        display:block;
    }

    .mensaje.error{
        background:#f8d7da;
        color:#721c24;
        border:1px solid #f5c6cb;
        display:block;
    }
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icono-192.png">
</head>
<body>

<div class="contenedor">

<h1>📅 Contador de Tiempo</h1>

<div id="mensaje" class="mensaje"></div>

<div class="formulario">
    <input type="date" id="fecha">

    <textarea id="detalle" placeholder="Escribe el detalle..."></textarea>

    <button onclick="agregarEvento()">Agregar</button>

    <div class="botones-grupo">
        <button class="btn-exportar" onclick="exportarDatos()">📥 Exportar</button>
        <button class="btn-importar" onclick="document.getElementById('archivoImport').click()">📤 Importar</button>
    </div>

    <input type="file" id="archivoImport" accept=".json" onchange="importarDatos(event)">
</div>

<div id="lista"></div>

</div>

<script>
let eventos = JSON.parse(localStorage.getItem("eventos")) || [];

function guardar(){
    localStorage.setItem("eventos", JSON.stringify(eventos));
}

function mostrarMensaje(texto, tipo){
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje ${tipo}`;
    
    setTimeout(() => {
        mensaje.className = "mensaje";
    }, 3000);
}

function calcularTiempo(fechaInicio){

    const inicio = new Date(fechaInicio);
    const hoy = new Date();

    let años = hoy.getFullYear() - inicio.getFullYear();
    let meses = hoy.getMonth() - inicio.getMonth();
    let dias = hoy.getDate() - inicio.getDate();

    if(dias < 0){
        meses--;
        const ultimoMes = new Date(hoy.getFullYear(), hoy.getMonth(), 0);
        dias += ultimoMes.getDate();
    }

    if(meses < 0){
        años--;
        meses += 12;
    }

    return `${años} años, ${meses} meses y ${dias} días`;
}

function mostrarEventos(){

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    if(eventos.length === 0){
        lista.innerHTML = "<p style='text-align:center; color:#999;'>No hay registros aún</p>";
        return;
    }

    eventos.forEach((evento, index) => {

        lista.innerHTML += `
            <div class="tarjeta">
                <div class="detalle">${evento.detalle}</div>

                <div class="fecha">
                    Fecha: ${evento.fecha}
                </div>

                <div class="tiempo">
                    ⏳ Han pasado:
                    ${calcularTiempo(evento.fecha)}
                </div>

                <button class="eliminar" onclick="eliminarEvento(${index})">
                    Eliminar
                </button>
            </div>
        `;
    });
}

function agregarEvento(){

    const fecha = document.getElementById("fecha").value;
    const detalle = document.getElementById("detalle").value;

    if(!fecha || !detalle){
        mostrarMensaje("⚠️ Completa todos los campos", "error");
        return;
    }

    eventos.unshift({
        fecha,
        detalle
    });

    guardar();
    mostrarEventos();
    mostrarMensaje("✅ Evento agregado correctamente", "exito");

    document.getElementById("fecha").value = "";
    document.getElementById("detalle").value = "";
}

function eliminarEvento(index){

    if(confirm("¿Eliminar este registro?")){
        eventos.splice(index, 1);
        guardar();
        mostrarEventos();
        mostrarMensaje("✅ Evento eliminado", "exito");
    }
}

function exportarDatos(){
    if(eventos.length === 0){
        mostrarMensaje("⚠️ No hay datos para exportar", "error");
        return;
    }

    const datos = {
        version: "1.0",
        fecha_exportacion: new Date().toISOString(),
        eventos: eventos
    };

    const contenido = JSON.stringify(datos, null, 2);
    const blob = new Blob([contenido], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const enlace = document.createElement("a");
    enlace.href = url;
    enlace.download = `contador-${new Date().toISOString().split('T')[0]}.json`;
    document.body.appendChild(enlace);
    enlace.click();
    document.body.removeChild(enlace);
    URL.revokeObjectURL(url);

    mostrarMensaje("✅ Datos exportados correctamente", "exito");
}

function importarDatos(event){
    const archivo = event.target.files[0];

    if(!archivo){
        return;
    }

    const lector = new FileReader();

    lector.onload = function(e){
        try{
            const datos = JSON.parse(e.target.result);

            if(!datos.eventos || !Array.isArray(datos.eventos)){
                mostrarMensaje("❌ Formato de archivo inválido", "error");
                return;
            }

            if(confirm("¿Deseas reemplazar todos los datos actuales? Esta acción no se puede deshacer.")){
                eventos = datos.eventos;
                guardar();
                mostrarEventos();
                mostrarMensaje(`✅ ${eventos.length} registros importados correctamente`, "exito");
            }
        } catch(error){
            mostrarMensaje("❌ Error al leer el archivo", "error");
            console.error(error);
        }
    };

    lector.readAsText(archivo);
    document.getElementById("archivoImport").value = "";
}

mostrarEventos();
</script>

</body>
</html>
